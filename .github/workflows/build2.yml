name: Android Build

on:
  push:
    branches: [ debugging]
  pull_request:
    branches: [ debugging ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    # Optional: Opt-in to Node 24 early to verify everything works
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: VoidAssistant-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
